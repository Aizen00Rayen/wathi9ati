<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>رسالة جديدة — وثيقتي</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"/>
</head>
<body style="margin:0;padding:0;background-color:#F5F0E8;font-family:'IBM Plex Sans Arabic',Arial,sans-serif;direction:rtl;">

  <!-- Wrapper -->
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#F5F0E8;padding:40px 16px;">
    <tr>
      <td align="center">
        <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;">

          <!-- ── HEADER ── -->
          <tr>
            <td style="background:#0D1B2A;border-radius:16px 16px 0 0;padding:32px 40px;text-align:center;">
              <h1 style="margin:0;font-size:36px;color:#C9A84C;font-family:'IBM Plex Sans Arabic',serif;font-weight:700;letter-spacing:1px;">
                وثيقتي
              </h1>
              <p style="margin:8px 0 0;color:rgba(245,240,232,0.65);font-size:13px;">
                محفظتك الرقمية الآمنة
              </p>
            </td>
          </tr>

          <!-- ── ALERT BANNER ── -->
          <tr>
            <td style="background:#C9A84C;padding:12px 40px;text-align:center;">
              <p style="margin:0;color:#0D1B2A;font-weight:700;font-size:14px;">
                📩 &nbsp; رسالة جديدة من نموذج التواصل
              </p>
            </td>
          </tr>

          <!-- ── BODY ── -->
          <tr>
            <td style="background:#ffffff;padding:40px;border-right:4px solid #C9A84C;">

              <!-- Sender info grid -->
              <table width="100%" cellpadding="0" cellspacing="0" style="margin-bottom:28px;">
                <tr>
                  <td width="50%" style="padding-left:8px;">
                    <div style="background:#F5F0E8;border-radius:10px;padding:16px 18px;">
                      <p style="margin:0 0 4px;font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">الاسم</p>
                      <p style="margin:0;font-size:15px;color:#0D1B2A;font-weight:600;">{{name}}</p>
                    </div>
                  </td>
                  <td width="50%" style="padding-right:8px;">
                    <div style="background:#F5F0E8;border-radius:10px;padding:16px 18px;">
                      <p style="margin:0 0 4px;font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">البريد الإلكتروني</p>
                      <p style="margin:0;font-size:15px;color:#0D1B2A;font-weight:600;">
                        <a href="mailto:{{email}}" style="color:#C9A84C;text-decoration:none;">{{email}}</a>
                      </p>
                    </div>
                  </td>
                </tr>
              </table>

              <!-- Subject -->
              <div style="background:#0D1B2A;border-radius:10px;padding:16px 20px;margin-bottom:24px;">
                <p style="margin:0 0 4px;font-size:11px;color:rgba(201,168,76,.6);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">الموضوع</p>
                <p style="margin:0;font-size:17px;color:#C9A84C;font-weight:700;">{{subject}}</p>
              </div>

              <!-- Message -->
              <div style="border:1px solid #e5e7eb;border-radius:10px;padding:24px;">
                <p style="margin:0 0 12px;font-size:11px;color:#9ca3af;font-weight:600;text-transform:uppercase;letter-spacing:.5px;">الرسالة</p>
                <p style="margin:0;font-size:15px;color:#4A5568;line-height:1.8;">{{message}}</p>
              </div>

              <!-- Reply CTA -->
              <div style="text-align:center;margin-top:32px;">
                <a href="mailto:{{email}}?subject=رد: {{subject}}"
                   style="display:inline-block;background:#0D1B2A;color:#C9A84C;text-decoration:none;
                          font-weight:700;font-size:15px;padding:14px 36px;border-radius:10px;
                          border:2px solid #C9A84C;letter-spacing:.3px;">
                  ↩ &nbsp; الرد على الرسالة
                </a>
              </div>

            </td>
          </tr>

          <!-- ── FOOTER ── -->
          <tr>
            <td style="background:#0D1B2A;border-radius:0 0 16px 16px;padding:24px 40px;text-align:center;">
              <p style="margin:0 0 6px;color:rgba(245,240,232,.45);font-size:12px;">
                📅 &nbsp; {{date}}
              </p>
              <p style="margin:0;color:rgba(245,240,232,.3);font-size:11px;">
                تم الإرسال عبر نموذج التواصل في موقع وثيقتي
                &nbsp;—&nbsp;
                <a href="https://wathi9ati.space" style="color:#C9A84C;text-decoration:none;">wathi9ati.space</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>

</body>
</html>
